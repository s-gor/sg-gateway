<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SG-Gateway{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" aria-label="Main navigation">
        <div class="brand">
          <div class="brand-mark">SG</div>
          <div>
            <div class="brand-name">SG-Gateway</div>
            <div class="brand-note">AmneziaWG + Xray</div>
          </div>
        </div>

        <nav class="nav">
          <a class="nav-item active" href="/">Главная</a>
          <a class="nav-item" href="#">Клиенты</a>
          <a class="nav-item" href="#">Подключения</a>
          <a class="nav-item" href="#">Правила трафика</a>
          <a class="nav-item" href="#">Безопасность</a>
          <a class="nav-item" href="#">Обслуживание</a>
          <a class="nav-item" href="#">Справка</a>
        </nav>
      </aside>

      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
